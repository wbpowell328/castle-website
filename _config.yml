title: CASTLE Lab
description: >-
  Warren B. Powell — Sequential Decision Analytics, Reinforcement Learning,
  Stochastic Optimization. Princeton ORFE.
author: Warren B. Powell

# URL settings for GitHub Pages preview at https://wbpowell328.github.io/castle-website/
url: "https://wbpowell328.github.io"
baseurl: "/castle-website"

# No parent theme — we ship our own layouts in _layouts/ and CSS in
# assets/css/main.css. Plugins below still work.

# Tell Jekyll to also process pages in the _pages/ folder
include:
  - _pages

# Give every page in _pages/ the "page" layout by default.
# Liquid is suppressed per-page by wrapping bodies in {% raw %}...{% endraw %}
# during the WordPress conversion (Jekyll 3.x on GitHub Pages doesn't support
# the front-matter render_with_liquid flag).
defaults:
  - scope:
      path: "_pages"
    values:
      layout: page

# Build settings
markdown: kramdown
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Exclude these from the published site
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - README.md
  - "*.xml"
  - wp-content/
  - attachment_urls.txt
  - download_failures.txt
  - download_attachments.sh
  - page_inventory.md
  - drop_list.md
